<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntax AR Space | Summer Campaign</title>
    
    <link rel="stylesheet" href="../css/styles.css">

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
        // Custom component to play/pause the video based on marker tracking
        AFRAME.registerComponent('mindar-video-handler', {
            init: function () {
                const target = this.el;
                const video = document.querySelector('#campaign-video');

                // Autoplay policy workaround: force mute first, or require user tap before this page loads
                target.addEventListener("targetFound", () => {
                    console.log("Poster Found! Playing video...");
                    video.play();
                });

                target.addEventListener("targetLost", () => {
                    console.log("Poster Lost! Pausing video...");
                    video.pause();
                });
            }
        });
    </script>
</head>
<body class="ar-body">

    <div class="ui-layer top-nav">
        <a href="../promotions.html" class="icon-btn clickable" title="Close AR Space">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </a>
        <div class="ar-title">Syntax AR Campaign</div>
        <div style="width: 44px;"></div> </div>

    <a-scene mindar-image="imageTargetSrc: ../assets/target/promotion.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" id="scene">
        
        <a-assets>
            <video id="campaign-video" src="../assets/video/campaign-ad.mp4" playsinline webkit-playsinline loop crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" mindar-video-handler>

            <a-plane src="#campaign-video" position="0 0 0" width="1.2" height="0.675" rotation="0 0 0"></a-plane>

            <a-entity position="0 0.55 0.1">
                <a-plane color="#000000" width="0.8" height="0.15" opacity="0.85"></a-plane>
                <a-text value="SUMMER SALE: 15% OFF" color="#FFFFFF" align="center" width="2.5" position="0 0 0.01" font="kelsonsans"></a-text>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        // Browsers block autoplaying videos with sound unless the user interacts with the page first.
        // This ensures audio works when the target is found.
        document.body.addEventListener('click', function() {
            const video = document.getElementById('campaign-video');
            video.muted = false;
        }, { once: true });
    </script>
</body>
</html>
